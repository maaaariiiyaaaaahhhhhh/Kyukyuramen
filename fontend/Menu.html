<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu – Kyukyu Ramen 99</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="Styles.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header" id="site-header">
    <div class="noodle-bg"></div>
    <div class="header-inner">
      <a href="index.html" class="logo-wrap">
        <div class="logo-mark">九九</div>
        <div class="logo-text">
          <span class="logo-main">KyuKyu</span>
          <span class="logo-sub">RAMEN 99</span>
        </div>
      </a>
      <nav class="main-nav">
        <a href="index.html"   class="nav-link">Home</a>
        <a href="menu.html"    class="nav-link active">Menu</a>
        <a href="about.html"   class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <div class="header-actions">
        <button class="user-btn" id="user-auth-btn" title="Login / Sign Up">
          <i class="bi bi-person"></i>
        </button>
        <button class="cart-btn" id="cart-toggle-btn">
          <i class="bi bi-bag-fill"></i>
          <span class="cart-badge" id="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- PAGE BANNER -->
  <div class="page-banner">
    <h2>Our Menu</h2>
    <p>Every bowl. Every time. ₱99.</p>
  </div>

  <!-- CATEGORY FILTER (populated by menu.js) -->
  <div class="filter-bar" id="filter-bar"></div>

  <!-- MENU + SIDEBAR LAYOUT -->
  <div class="menu-layout" id="menu-layout">
    <div class="catalogue-area" id="catalogue-area">
      <div class="menu-grid" id="menu-grid">
        <!-- Loading skeleton -->
        <div class="menu-loading">Loading menu…</div>
      </div>
    </div>

    <!-- CART SIDEBAR -->
    <aside class="cart-sidebar" id="cart-sidebar">
      <div class="sidebar-header">
        <h3><i class="bi bi-bag-fill"></i> Your Cart</h3>
        <button class="close-sidebar-btn" id="close-sidebar"><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="sidebar-items" id="sidebar-items">
        <div class="empty-cart-msg" id="empty-cart-msg">
          <div class="empty-icon">🍜</div>
          <p>Your cart is empty.<br/>Add some ramen!</p>
        </div>
      </div>
      <div class="sidebar-footer" id="sidebar-footer">
        <div class="subtotal-row">
          <span>Subtotal</span>
          <span id="subtotal-val">₱0</span>
        </div>
        <div class="subtotal-row del-row">
          <span>Delivery Fee</span>
          <span>₱49</span>
        </div>
        <div class="subtotal-row total-row">
          <span>Total</span>
          <span id="total-val">₱0</span>
        </div>
        <button class="checkout-btn" onclick="openCheckout()">
          <i class="bi bi-credit-card-fill"></i> Checkout
        </button>
      </div>
    </aside>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer mini-footer">
    <div class="footer-noodle-bg"></div>
    <div class="footer-bottom">
      <span>© 2025 KyuKyu Ramen 99. All rights reserved.</span>
      <span>Made with 🍜 in the Philippines</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="cart.js"></script>
  <script src="auth.js"></script>
  <script src="menu.js"></script>
</body>
</html>
